#
# Profile & Mission (자기소개 및 연구 비전)
#
profile: >
  자연어 처리(NLP), 검색 증강 생성(RAG), 정보 추출(Information Extraction)을 중심으로 비정형 문서를 구조화하는 AI 시스템을 연구합니다. 
  사이버경찰학의 분석적 통찰과 컴퓨터공학의 기술력을 결합하여, 단순 텍스트 추출을 넘어 문서를 이해하고 의미 기반으로 검색·생성할 수 있는 실용적 AI 시스템 구축을 목표로 합니다.
  <br><br>
  I am an Undergraduate Researcher specializing in AI systems for structuring unstructured documents, with a focus on NLP, RAG, and Information Extraction. 
  By bridging the gap between Cyber Law/Security and Computer Science, I aim to build practical AI systems that go beyond simple text extraction to achieve semantic-based document understanding and retrieval.

