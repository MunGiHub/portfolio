career-profile:
  title: Career Profile
  summary: |
    사이버경찰학의 분석적 통찰과 컴퓨터공학의 기술력을 결합하여, 자연어 처리(NLP) 및 RAG(검색 증강 생성) 기반의 고도화된 데이터 추출 기술을 연구하고 있습니다. 
    현재 Docling, Clova OCR, Upstage AI 등 최신 문서 이해 엔진들을 비교 분석하며, 비정형 PDF 데이터를 AI 시스템에 최적화된 형태로 파싱하는 연구에 집중하고 있습니다.
    
    Undergraduate Researcher bridging the gap between Cyber Law/Security and Computer Science, with a focus on NLP, RAG, and advanced Data Extraction.
    Currently conducting comparative analysis of state-of-the-art document parsing engines (Docling, Clova OCR, Upstage AI) to optimize unstructured data for retrieval systems.

